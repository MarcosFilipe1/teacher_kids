<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Noah – Trilha de Aprendizado</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:#0f1117; color:#fff; min-height:100dvh; display:flex; flex-direction:column; }

/* Top bar */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid #1a1f2e; position:sticky; top:0; background:#0f1117; z-index:10; }
.back-btn { color:#666; text-decoration:none; font-size:0.9rem; padding:8px; }
.xp-badge { display:flex; align-items:center; gap:5px; background:#1a1f2e; padding:6px 12px; border-radius:99px; font-size:0.82rem; font-weight:600; color:#f5c842; }
.streak-badge { display:flex; align-items:center; gap:4px; background:#1a1f2e; padding:6px 10px; border-radius:99px; font-size:0.82rem; color:#f5a742; }

/* Dino */
.dino-hero { display:flex; flex-direction:column; align-items:center; padding:16px 16px 8px; gap:6px; }
.dino-emoji { font-size:clamp(3.5rem,12vw,5.5rem); line-height:1; transition:all 0.5s; }
.dino-label { font-size:0.78rem; color:#555; }
.dino-phase { font-size:0.75rem; padding:3px 10px; border-radius:99px; background:#1a2e1a; color:#5ba35b; font-weight:600; }

/* XP bar */
.xp-bar-wrap { margin:0 16px 2px; background:#1a1f2e; border-radius:99px; height:7px; overflow:hidden; }
.xp-bar { height:100%; background:linear-gradient(90deg,#7c6af7,#5ba3f5); border-radius:99px; transition:width 0.6s; }
.xp-label { text-align:center; font-size:0.72rem; color:#333; margin-bottom:14px; }

/* Trail */
.trail-title { padding:0 16px 10px; font-size:0.7rem; color:#333; text-transform:uppercase; letter-spacing:0.08em; }
.trail { display:flex; flex-direction:column; padding:0 16px; flex:1; gap:6px; }
.phase-block { }
.phase-header { display:flex; align-items:center; gap:10px; padding:8px 0 6px; }
.phase-dot { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.78rem; font-weight:700; flex-shrink:0; }
.phase-dot.done { background:#1a2e1a; color:#5ba35b; }
.phase-dot.active { background:#1d1a3a; color:#7c6af7; border:2px solid #7c6af7; }
.phase-dot.locked { background:#1a1f2e; color:#333; }
.phase-title { font-size:0.9rem; font-weight:600; }
.phase-title.locked { color:#333; }
.steps { display:flex; gap:8px; padding:0 0 10px 40px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.step-btn { display:flex; flex-direction:column; align-items:center; gap:5px; min-width:76px; padding:12px 8px; background:#1a1f2e; border:2px solid #2a2f3e; border-radius:14px; cursor:pointer; color:#fff; transition:all 0.2s; flex-shrink:0; }
.step-btn:active { transform:scale(0.94); }
.step-btn.done { border-color:#1a3a1a; background:#111a11; }
.step-btn.active { border-color:#7c6af7; background:#1d1a3a; }
.step-btn.locked { opacity:0.35; cursor:not-allowed; }
.step-icon { font-size:1.5rem; }
.step-label { font-size:0.65rem; color:#888; text-align:center; line-height:1.3; }
.step-btn.active .step-label { color:#b8a0f7; }
.step-check { font-size:0.65rem; }
.step-btn.done .step-check { color:#5ba35b; }
.step-btn.active .step-check { color:#b8a0f7; }

/* Activity overlay */
.act-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:100; flex-direction:column; align-items:center; justify-content:flex-end; }
.act-overlay.visible { display:flex; }
.act-sheet { background:#141926; border-radius:24px 24px 0 0; width:100%; max-width:600px; padding:16px 16px 32px; display:flex; flex-direction:column; gap:14px; max-height:92dvh; overflow-y:auto; }
.sheet-handle { width:36px; height:4px; background:#2a2f3e; border-radius:2px; margin:0 auto; }
.sheet-title { text-align:center; font-size:0.88rem; font-weight:600; color:#7c6af7; }

/* Word display */
.word-card { background:#1a1f2e; border-radius:18px; padding:20px 16px; text-align:center; display:flex; flex-direction:column; gap:6px; }
.word-emoji-big { font-size:clamp(3.5rem,16vw,6rem); }
.word-pt { font-size:clamp(1.6rem,6.5vw,2.5rem); font-weight:700; }
.word-en { font-size:clamp(1rem,4vw,1.5rem); color:#5ba3f5; }
.word-ph { font-size:0.85rem; color:#444; }

/* Luna fala */
.luna-area { display:flex; flex-direction:column; gap:10px; }
.luna-bubble { background:#1d1a3a; border:1px solid #7c6af7; border-radius:14px; padding:12px 14px; font-size:0.92rem; line-height:1.6; display:none; }
.luna-bubble.visible { display:block; }
.luna-name { font-size:0.7rem; color:#7c6af7; font-weight:700; margin-bottom:5px; }
.luna-thinking { text-align:center; font-size:0.82rem; color:#444; display:none; padding:8px; }
.luna-thinking.visible { display:block; }

/* Mic */
.mic-section { display:flex; flex-direction:column; align-items:center; gap:8px; }
.mic-btn { width:72px; height:72px; border-radius:50%; background:#1a1f2e; border:3px solid #2a2f3e; font-size:1.8rem; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
.mic-btn.recording { border-color:#f75a5a; background:#2a1a1a; animation:pulse 1s infinite; }
.mic-btn:disabled { opacity:0.4; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
.mic-label { font-size:0.8rem; color:#555; }

/* XP pop */
.xp-pop { text-align:center; font-size:1.1rem; font-weight:700; color:#f5c842; display:none; animation:pop 0.4s; }
.xp-pop.visible { display:block; }
@keyframes pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }

/* Progress mini */
.step-progress { display:flex; align-items:center; justify-content:center; gap:6px; font-size:0.75rem; color:#555; }
.word-dots { display:flex; gap:5px; }
.word-dot { width:8px; height:8px; border-radius:50%; background:#2a2f3e; transition:all 0.3s; }
.word-dot.done { background:#5ba35b; }
.word-dot.current { background:#7c6af7; transform:scale(1.3); }

/* Close btn */
.close-btn { background:#1a1f2e; border:none; color:#666; padding:10px; border-radius:10px; font-size:0.85rem; cursor:pointer; text-align:center; }

/* Dino evolve */
.dino-evolve { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
.dino-evolve.visible { display:flex; }
.evolve-emoji { font-size:clamp(5rem,20vw,8rem); animation:bounce 0.6s infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-16px)} }
.evolve-title { font-size:clamp(1.4rem,5vw,2rem); font-weight:700; color:#f5c842; text-align:center; padding:0 20px; }
.evolve-sub { font-size:clamp(0.9rem,3vw,1.1rem); color:#aaa; text-align:center; padding:0 20px; }
.evolve-btn { padding:14px 40px; background:#7c6af7; border:none; color:#fff; border-radius:14px; font-size:1rem; font-weight:600; cursor:pointer; }

.safe-bottom { height:env(safe-area-inset-bottom,16px); }
</style>
</head>

const DINO_STAGES = [
  {emoji:"🥚",  name:"Ovo misterioso",   phase:"Fase 1 de 4"},
  {emoji:"🦕",  name:"Filhote pequeno",  phase:"Fase 2 de 4"},
  {emoji:"🦖",  name:"Dinossauro jovem", phase:"Fase 3 de 4"},
  {emoji:"✨🦕",name:"Dino brilhante!",  phase:"Completo! 🎉"},
];

// ─── Estado ───────────────────────────────────────────────────────────────────
let progress = {current_phase:1, current_step:1, total_xp:0, dino_stage:0, streak_days:0};
let currentActivity = null;
let wordSet = [];
let wordIdx = 0;
let sessionId = null;
let lunaReady = false;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
const XP_PER_PHASE = 100;

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', async () => {
  const res = await fetch('/api/progress/noah');
  if (res.ok) progress = await res.json();
  renderAll();
});

function renderAll() {
  renderDino();
  renderXpBar();
  renderTrail();
}

function renderDino() {
  const s = DINO_STAGES[Math.min(progress.dino_stage || 0, 3)];
  document.getElementById('dino-emoji').textContent = s.emoji;
  document.getElementById('dino-label').textContent = s.name;
  document.getElementById('dino-phase').textContent = s.phase;
  document.getElementById('xp-total').textContent = progress.total_xp || 0;
  document.getElementById('streak').textContent = progress.streak_days || 0;
}

function renderXpBar() {
  const xpInPhase = (progress.total_xp || 0) % XP_PER_PHASE;
  const pct = Math.min((xpInPhase / XP_PER_PHASE) * 100, 100);
  document.getElementById('xp-bar').style.width = pct + '%';
  document.getElementById('xp-label').textContent = `${xpInPhase} / ${XP_PER_PHASE} XP para evoluir`;
}

function renderTrail() {
  const trail = document.getElementById('trail');
  trail.innerHTML = '';
  PHASES.forEach(phase => {
    const isDone   = phase.id < progress.current_phase;
    const isActive = phase.id === progress.current_phase;
    const isLocked = phase.id > progress.current_phase;

    const block = document.createElement('div');
    block.className = 'phase-block';
    block.innerHTML = `
      <div class="phase-header">
        <div class="phase-dot ${isDone?'done':isActive?'active':'locked'}">${isDone?'✓':phase.id}</div>
        <div class="phase-title${isLocked?' locked':''}">${phase.title}</div>
      </div>
      <div class="steps" id="steps-${phase.id}"></div>
    `;
    trail.appendChild(block);

    const stepsDiv = block.querySelector(`#steps-${phase.id}`);
    phase.steps.forEach(step => {
      const stepDone   = isDone || (isActive && step.id < progress.current_step);
      const stepActive = isActive && step.id === progress.current_step;
      const stepLocked = isLocked || (isActive && step.id > progress.current_step);

      const btn = document.createElement('button');
      btn.className = `step-btn ${stepDone?'done':stepActive?'active':'locked'}`;
      btn.innerHTML = `
        <div class="step-icon">${step.icon}</div>
        <div class="step-label">${step.label}</div>
        <div class="step-check">${stepDone?'✓ feito':stepActive?'▶ jogar':''}</div>
      `;
      if (!stepLocked) btn.onclick = () => openStep(phase, step);
      stepsDiv.appendChild(btn);
    });
  });
}

// ─── Abrir atividade ──────────────────────────────────────────────────────────
async function openStep(phase, step) {
  currentActivity = { phase, step };
  wordSet = WORD_SETS[step.wsKey] || WORD_SETS.animals;
  wordIdx = 0;
  lunaReady = false;

  document.getElementById('sheet-title').textContent = `${phase.title} · ${step.label}`;
  document.getElementById('act-overlay').classList.add('visible');
  document.getElementById('luna-bubble').classList.remove('visible');
  document.getElementById('xp-pop').classList.remove('visible');
  document.getElementById('mic-label').textContent = 'Aguardando Luna...';
  document.getElementById('mic-btn').disabled = true;

  showWord();
  renderDots();

  // Inicia sessão
  const res = await fetch('/api/session/start', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      profile:'noah', activity:step.activity,
      phase:phase.id, step:step.id,
      word_set: wordSet, word_set_key: step.wsKey,
    }),
  });
  const data = await res.json();
  sessionId = data.session_id;

  // Luna fala ao abrir
  await lunaStart(step.activity, step.wsKey);
}

async function lunaStart(activity, wsKey) {
  setThinking(true);
  const res = await fetch('/api/luna/start', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      profile:'noah',
      activity_type: `${activity}_${wsKey}`,
      word_set: wordSet,
    }),
  });
  const data = await res.json();
  setThinking(false);
  showLuna(data.text);
  playAudio(data.audio_b64);
  lunaReady = true;
  document.getElementById('mic-btn').disabled = false;
  document.getElementById('mic-label').textContent = 'Toque e responda a Luna';
}

function showWord() {
  const w = wordSet[wordIdx];
  if (!w) return;
  document.getElementById('word-emoji').textContent = w.emoji;
  document.getElementById('word-pt').textContent = w.pt;
  document.getElementById('word-en').textContent = w.en;
  document.getElementById('word-ph').textContent = w.ph || '';
  renderDots();
}

function renderDots() {
  const container = document.getElementById('word-dots');
  container.innerHTML = '';
  wordSet.slice(0, 8).forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'word-dot' + (i < wordIdx ? ' done' : i === wordIdx ? ' current' : '');
    container.appendChild(dot);
  });
  document.getElementById('word-counter').textContent = `${wordIdx + 1} / ${wordSet.length}`;
}

function closeActivity() {
  document.getElementById('act-overlay').classList.remove('visible');
  if (sessionId) {
    fetch('/api/session/end', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({profile:'noah', xp:0}),
    });
    sessionId = null;
  }
  lunaReady = false;
}

// ─── Gravação ─────────────────────────────────────────────────────────────────
async function toggleRecording() {
  if (!lunaReady) return;
  if (isRecording) stopRecording(); else startRecording();
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = processRecording;
    mediaRecorder.start();
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('mic-btn').textContent = '⏹️';
    document.getElementById('mic-label').textContent = 'Ouvindo... toque para parar';
  } catch(e) {
    document.getElementById('mic-label').textContent = 'Microfone indisponível (precisa HTTPS)';
  }
}

function stopRecording() {
  if (mediaRecorder) mediaRecorder.stop();
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('mic-btn').textContent = '🎤';
  document.getElementById('mic-label').textContent = 'Processando...';
}

async function processRecording() {
  const blob = new Blob(audioChunks, {type:'audio/webm'});
  const formData = new FormData();
  formData.append('audio', blob, 'audio.webm');

  document.getElementById('mic-btn').disabled = true;
  setThinking(true);

  // Transcreve
  const sttRes = await fetch('/api/voice/listen', {method:'POST', body:formData});
  const {text} = await sttRes.json();

  if (!text) {
    setThinking(false);
    document.getElementById('mic-btn').disabled = false;
    document.getElementById('mic-label').textContent = 'Não entendi, tente de novo';
    return;
  }

  // Envia para Luna decidir
  const res = await fetch('/api/luna/respond', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({profile:'noah', child_said:text, is_word_attempt:true}),
  });
  const data = await res.json();

  setThinking(false);
  showLuna(data.text);
  playAudio(data.audio_b64);

  // Atualiza XP
  if (data.progress && data.progress.total_xp !== undefined) {
    progress.total_xp = data.progress.total_xp;
    progress.dino_stage = data.progress.dino_stage;
    progress.streak_days = data.progress.streak_days;
    renderDino();
    renderXpBar();
  }

  // Mostra XP ganho
  if (data.xp_earned) showXpPop(data.xp_earned);

  // Processa ação da Luna
  const action = data.action;
  if (action === 'PRÓXIMA' || action === 'PROXIMA') {
    wordIdx = data.word_idx || (wordIdx + 1);
    if (wordIdx < wordSet.length) {
      setTimeout(() => { showWord(); }, 1800);
    }
  } else if (action === 'COMPLETO') {
    setTimeout(() => completeStep(), 2000);
  }

  document.getElementById('mic-btn').disabled = false;
  document.getElementById('mic-label').textContent = 'Toque e responda a Luna';
}

async function completeStep() {
  const res = await fetch('/api/progress/complete-step', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({profile:'noah', xp:30}),
  });
  const newProg = await res.json();
  const oldDino = progress.dino_stage;
  progress = {...progress, ...newProg};
  renderAll();
  closeActivity();
  if (newProg.dino_stage > oldDino) showDinoEvolve(newProg.dino_stage);
}

function showDinoEvolve(stage) {
  const s = DINO_STAGES[Math.min(stage, 3)];
  document.getElementById('evolve-emoji').textContent = s.emoji;
  document.getElementById('evolve-title').textContent = 'Incrível, Noah! 🎉';
  document.getElementById('evolve-sub').textContent = `Seu dinossauro virou: ${s.name}!`;
  document.getElementById('dino-evolve').classList.add('visible');
}
function closeDinoEvolve() { document.getElementById('dino-evolve').classList.remove('visible'); }

function showLuna(text) {
  document.getElementById('luna-text').textContent = text;
  document.getElementById('luna-bubble').classList.add('visible');
}
function setThinking(on) { document.getElementById('luna-thinking').classList.toggle('visible', on); }
function showXpPop(xp) {
  const el = document.getElementById('xp-pop');
  el.textContent = `+${xp} XP ⭐`;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2000);
}
function playAudio(b64) {
  if (!b64) return;
  new Audio('data:audio/mp3;base64,' + b64).play().catch(()=>{});
}

window.addEventListener('beforeunload', () => {
  if (sessionId) navigator.sendBeacon('/api/session/end', JSON.stringify({profile:'noah',xp:0}));
});
</script>
