<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprendendo juntos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #fff;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    overflow: hidden;
  }
  h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 600;
    letter-spacing: -0.02em;
    text-align: center;
    color: #f5f5f5;
  }
  h1 span { color: #7c6af7; }
  .subtitle {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    color: #888;
    text-align: center;
    margin-top: -20px;
  }
  .profiles {
    display: flex;
    gap: clamp(20px, 4vw, 60px);
    align-items: center;
  }
  .profile-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    cursor: pointer;
    padding: 40px 50px;
    border-radius: 24px;
    border: 2px solid transparent;
    transition: all 0.25s ease;
    text-decoration: none;
    color: inherit;
  }
  .profile-card:hover {
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    transform: translateY(-4px);
  }
  .avatar {
    width: clamp(100px, 15vw, 160px);
    height: clamp(100px, 15vw, 160px);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(3rem, 7vw, 5rem);
    font-weight: 700;
  }
  .avatar.noah { background: #1a3a5c; color: #5ba3f5; }
  .avatar.aurora { background: #3a1a2e; color: #f57ab3; }
  .profile-name {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 600;
  }
  .profile-desc {
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: #888;
    text-align: center;
  }
  .profile-tag {
    font-size: clamp(0.75rem, 1.5vw, 0.9rem);
    padding: 6px 16px;
    border-radius: 99px;
    font-weight: 500;
  }
  .tag-noah { background: #1a3a5c; color: #5ba3f5; }
  .tag-aurora { background: #3a1a2e; color: #f57ab3; }

  .clock {
    font-size: 1rem;
    color: #444;
    position: fixed;
    bottom: 30px;
  }
</style>
</head>
<body>
  <h1>Aprendendo <span>juntos</span></h1>
  <p class="subtitle">Português e inglês para toda a família</p>

  <div class="profiles">
    <a href="/noah" class="profile-card">
      <div class="avatar noah">N</div>
      <div class="profile-name">Noah</div>
      <div class="profile-desc">6 anos</div>
      <span class="profile-tag tag-noah">Alfabetização bilíngue</span>
    </a>

    <a href="/aurora" class="profile-card">
      <div class="avatar aurora">A</div>
      <div class="profile-name">Aurora</div>
      <div class="profile-desc">10 meses</div>
      <span class="profile-tag tag-aurora">Estimulação de linguagem</span>
    </a>
  </div>

  <div class="clock" id="clock"></div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' }) +
        ' · ' + now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
