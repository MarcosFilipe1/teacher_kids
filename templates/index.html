<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Aprendendo Juntos</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #fff;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    gap: 32px;
  }
  .logo {
    text-align: center;
  }
  .logo h1 {
    font-size: clamp(1.8rem, 6vw, 3rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .logo h1 span { color: #7c6af7; }
  .logo p {
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    color: #666;
    margin-top: 6px;
  }

  .profiles {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 420px;
  }
  @media (min-width: 500px) {
    .profiles { flex-direction: row; max-width: 800px; }
    .profiles a { flex: 1; }
  }

  .profile-card {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 20px 24px;
    background: #1a1f2e;
    border: 2px solid #2a2f3e;
    border-radius: 20px;
    text-decoration: none;
    color: #fff;
    transition: all 0.2s;
    cursor: pointer;
  }
  .profile-card:active { transform: scale(0.97); }
  @media (min-width: 500px) {
    .profile-card {
      flex-direction: column;
      align-items: center;
      padding: 36px 24px;
      gap: 14px;
      text-align: center;
    }
  }
  .profile-card.noah:hover, .profile-card.noah:focus { border-color: #5ba3f5; background: #141c2e; }
  .profile-card.aurora:hover, .profile-card.aurora:focus { border-color: #f57ab3; background: #1e1120; }

  .avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; font-weight: 700;
    flex-shrink: 0;
  }
  @media (min-width: 500px) {
    .avatar { width: 90px; height: 90px; font-size: 2.2rem; }
  }
  .noah .avatar { background: #1a3a5c; color: #5ba3f5; }
  .aurora .avatar { background: #3a1a2e; color: #f57ab3; }

  .profile-info h2 {
    font-size: clamp(1.2rem, 4vw, 1.6rem);
    font-weight: 700;
    margin-bottom: 4px;
  }
  .profile-info p { font-size: 0.85rem; color: #888; }
  .profile-tag {
    display: inline-block;
    margin-top: 8px;
    font-size: 0.72rem;
    padding: 4px 12px;
    border-radius: 99px;
    font-weight: 600;
  }
  .noah .profile-tag { background: #1a3a5c; color: #5ba3f5; }
  .aurora .profile-tag { background: #3a1a2e; color: #f57ab3; }

  .clock {
    font-size: 0.8rem;
    color: #333;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="logo">
    <h1>Aprendendo <span>Juntos</span></h1>
    <p>Português e inglês para toda a família</p>
  </div>

  <div class="profiles">
    <a href="/noah" class="profile-card noah">
      <div class="avatar">N</div>
      <div class="profile-info">
        <h2>Noah</h2>
        <p>6 anos</p>
        <span class="profile-tag">Trilha bilíngue</span>
      </div>
    </a>
    <a href="/aurora" class="profile-card aurora">
      <div class="avatar">A</div>
      <div class="profile-info">
        <h2>Aurora</h2>
        <p>10 meses</p>
        <span class="profile-tag">Estimulação</span>
      </div>
    </a>
  </div>

  <div class="clock" id="clock"></div>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' }) +
        ' · ' + now.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
    }
    updateClock();
    setInterval(updateClock, 30000);
  </script>
</body>
</html>
